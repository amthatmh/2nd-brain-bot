name: Python package

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        python -m pip install flake8 pytest pytest-asyncio
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    - name: Lint with flake8
      run: |
        # Stop the build on Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Warnings only — exit zero so lint issues don't block merge
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Test with pytest
      env:
        TELEGRAM_TOKEN: "x"
        TELEGRAM_CHAT_ID: "1"
        ANTHROPIC_API_KEY: "x"
        NOTION_TOKEN: "x"
        NOTION_DB_ID: "x"
        NOTION_HABIT_DB: "x"
        NOTION_LOG_DB: "x"
        NOTION_STREAK_DB: "x"
        NOTION_CINEMA_LOG_DB: "x"
        NOTION_NOTES_DB: "x"
        NOTION_DIGEST_SELECTOR_DB: "x"
        NOTION_UTILITY_SCHEDULER_DB: "x"
        NOTION_PACKING_ITEMS_DB: "x"
        NOTION_TRIPS_DB: "x"
        OPENWEATHER_KEY: "x"
        HEALTH_STEPS_THRESHOLD: "10000"
        HEALTH_HABIT_NAME: "Steps"
      run: |
        pytest tests/ -v --tb=short
