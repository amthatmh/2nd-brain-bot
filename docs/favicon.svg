<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="hGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ff7a63"/>
      <stop offset="1" stop-color="#e0466b"/>
    </linearGradient>
    <linearGradient id="checkGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7a94b"/>
      <stop offset="1" stop-color="#f5871f"/>
    </linearGradient>
  </defs>

  <!-- rounded card background -->
  <rect x="16" y="16" width="480" height="480" rx="120" fill="#241519"/>

  <!-- checklist dots -->
  <circle cx="120" cy="176" r="28" fill="#f5a623"/>
  <circle cx="120" cy="256" r="28" fill="#e0466b"/>
  <circle cx="120" cy="336" r="28" fill="#4a90d9"/>

  <!-- letter H -->
  <g fill="url(#hGrad)">
    <rect x="188" y="150" width="44" height="230" rx="22"/>
    <rect x="300" y="150" width="44" height="230" rx="22"/>
    <rect x="188" y="244" width="156" height="44" rx="22"/>
  </g>

  <!-- check mark -->
  <path d="M300 322 L344 366 L432 268"
        fill="none" stroke="url(#checkGrad)" stroke-width="42"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
