<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Habit Grid</title>
  <style>
    :root{
      --bg:#0b0b11;
      --card:#06060b;
      --card-border:#1d1d28;
      --text:#f5f5f8;
      --muted:#a2a3b3;
      --muted-2:#6e7081;
      --purple:#a259ff;
      --panel:#12121a;
      --shadow:0 12px 34px rgba(0,0,0,.38);
      --radius-xl:28px;
      --square:17px;
      --gap:5px;
      --icon:82px;
      --check:82px;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      font-family:Inter,ui-sans-serif,system-ui,-apple-system,sans-serif;
      color:var(--text);
      background:radial-gradient(circle at top center,rgba(162,89,255,.16),transparent 28%),
                 linear-gradient(180deg,#0b0b11 0%,#0c0c13 100%);
      min-height:100vh;
    }
    .app{max-width:1060px;margin:0 auto;padding:26px 16px 40px}
    .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px}
    .brand{font-size:2rem;font-weight:800;letter-spacing:-.04em}
    .brand .accent{color:var(--purple)}
    .sub{color:var(--muted);margin-top:6px;font-size:.95rem}
    .chip{border:1px solid #232332;background:rgba(255,255,255,.02);color:var(--text);padding:10px 16px;border-radius:14px;font-size:.9rem}
    .chip.active{background:rgba(138,92,255,.15);border-color:rgba(138,92,255,.42)}
    .stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;margin-bottom:18px;max-width:460px}
    .stat{background:rgba(255,255,255,.025);border:1px solid #222230;border-radius:16px;padding:12px 14px;box-shadow:var(--shadow)}
    .stat .k{color:var(--muted);font-size:.88rem;margin-bottom:8px}
    .stat .v{font-size:1.45rem;font-weight:800;letter-spacing:-.03em}
    .layout{display:grid;grid-template-columns:minmax(0,1fr);gap:18px;align-items:start}
    .panel{background:linear-gradient(180deg,rgba(255,255,255,.02),rgba(255,255,255,.01));border:1px solid #20202c;border-radius:var(--radius-xl);box-shadow:var(--shadow);overflow:hidden}
    .panel-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:20px 20px 10px}
    .panel-head h2{margin:0;font-size:1.1rem;letter-spacing:-.02em}
    .panel-sub{padding:0 20px 18px;color:var(--muted);font-size:.9rem}
    .cards{display:flex;flex-direction:column;gap:16px;padding:0 14px 16px}
    .habit-card{background:var(--card);border:1px solid var(--card-border);border-radius:26px;padding:16px}
    .habit-top{display:grid;grid-template-columns:var(--icon) 1fr var(--check);gap:16px;align-items:center;margin-bottom:14px}
    .iconbox{width:var(--icon);height:var(--icon);border-radius:24px;display:grid;place-items:center;font-size:2rem;border:1px solid rgba(255,255,255,.06);background:#151520;user-select:none}
    .meta h3{margin:0 0 4px;font-size:1.18rem;letter-spacing:-.025em;font-weight:700}
    .meta .line{color:var(--muted);font-size:.88rem}
    .check{width:var(--check);height:var(--check);border-radius:24px;border:none;font-size:1.8rem;cursor:pointer;display:grid;place-items:center;color:#fff;transition:transform .12s ease,filter .12s ease;text-decoration:none}
    .check:hover{transform:scale(1.06);filter:brightness(1.1)}
    .check.done{background:rgba(74,222,128,.15)!important;cursor:default}
    .grid-wrap{overflow-x:auto;padding-bottom:4px;scrollbar-width:thin}
    .grid-shell{display:flex;align-items:flex-start;gap:10px}
    .day-labels{
      display:grid;
      grid-template-rows:repeat(7,var(--square));
      gap:var(--gap);
      color:var(--muted-2);
      font-size:.78rem;
      min-width:34px;
      padding-top:2px;
    }
    .day-labels span{display:flex;align-items:center}
    .grid{display:grid;grid-auto-flow:column;grid-template-rows:repeat(7,var(--square));grid-auto-columns:var(--square);gap:var(--gap);width:max-content;padding:2px 0}
    .cell{width:var(--square);height:var(--square);border-radius:5px;transition:transform .08s ease,filter .12s ease;cursor:default}
    .cell:hover{transform:scale(1.1);filter:brightness(1.15)}
    .cell.today{outline:2px solid rgba(255,255,255,.55);outline-offset:1px}
    .cell.future{opacity:.32;filter:saturate(.75)}
    .c-pink   .cell.on{background:#f47b88}.c-pink   .cell.off{background:#2c1218}
    .c-grey   .cell.on{background:#d6d2cb}.c-grey   .cell.off{background:#2b2b33}
    .c-blue   .cell.on{background:#5b9cf6}.c-blue   .cell.off{background:#0d1e3a}
    .c-green  .cell.on{background:#4ade80}.c-green  .cell.off{background:#0d2b1a}
    .c-orange .cell.on{background:#fb923c}.c-orange .cell.off{background:#2b1408}
    .c-purple .cell.on{background:#c084fc}.c-purple .cell.off{background:#1e0a38}
    .legend{display:flex;align-items:center;justify-content:space-between;color:var(--muted-2);font-size:.78rem;margin-top:12px}
    .legend-right{display:flex;align-items:center;gap:8px}
    .mini{width:11px;height:11px;border-radius:3px;display:inline-block;margin-right:2px}
    .check{font-size:2rem}
    .check:not(.done){border:1px solid rgba(255,255,255,.08)}
    .loading{display:flex;align-items:center;justify-content:center;height:200px;color:var(--muted);font-size:.95rem;gap:12px}
    .spinner{width:20px;height:20px;border:2px solid rgba(138,92,255,.3);border-top-color:var(--purple);border-radius:50%;animation:spin .7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .error-msg{color:#f47b88;padding:20px;text-align:center;font-size:.9rem}
    @media(max-width:980px){.stats{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:680px){
      :root{--square:14px;--gap:4px;--icon:66px;--check:64px}
      .app{padding:18px 10px 30px}.brand{font-size:1.6rem}
      .stats{grid-template-columns:repeat(2,1fr)}
      .iconbox{border-radius:18px;font-size:1.5rem}.check{border-radius:18px;font-size:1.5rem}
    }
  </style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div>
      <div class="brand">Habit<span class="accent">Kit</span></div>
      <div class="sub">Powered by Notion · Live from Railway</div>
    </div>
    <div class="chip active" id="lastUpdated">Loading...</div>
  </div>

  <div class="stats">
    <div class="stat"><div class="k">Active habits</div><div class="v" id="sHabits">—</div></div>
    <div class="stat"><div class="k">7-day score</div><div class="v" id="sWeek">—</div></div>
  </div>

  <div class="layout">
    <section class="panel">
      <div class="panel-head">
        <h2>Week-by-week grid</h2>
        <div class="chip" id="weeksChip">— weeks</div>
      </div>
      <div class="panel-sub">Weeks run Sun→Sat top-to-bottom · today is outlined · future days are faded</div>
      <div class="cards" id="cards">
        <div class="loading"><div class="spinner"></div> Fetching from Notion…</div>
      </div>
    </section>

  </div>
</div>

<script>
const API_BASE    = 'https://worker-production-d366.up.railway.app';
const API_URL     = `${API_BASE}/habits-data`;
const LOG_API_URL = `${API_BASE}/log-habit`;

const ICON_MAP = {
  'workout':'🏋️','exercise':'🏋️','creatine':'🥛',
  'protein':'🥤','stretch':'🧘','allergy':'💊','magnesium':'🌙',
};

function habitIcon(name) {
  const l = name.toLowerCase();
  for (const [k,v] of Object.entries(ICON_MAP)) if (l.includes(k)) return v;
  return '⭐';
}

async function logHabitFromWeb(habit, triggerEl) {
  if (!habit?.id || !triggerEl) return;
  const old = triggerEl.textContent;
  triggerEl.textContent = '…';
  triggerEl.disabled = true;
  try {
    const res = await fetch(LOG_API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ habitId: habit.id }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    triggerEl.textContent = '✅';
    await loadData();
  } catch (e) {
    triggerEl.textContent = old;
    triggerEl.disabled = false;
    alert(`Could not log "${habit.name}" right now.\n${e.message}`);
  }
}

function getColor(colorClass, on) {
  const m = {
    'c-pink':{on:'#f47b88',off:'#2c1218'},'c-grey':{on:'#d6d2cb',off:'#2b2b33'},
    'c-blue':{on:'#5b9cf6',off:'#0d1e3a'},'c-green':{on:'#4ade80',off:'#0d2b1a'},
    'c-orange':{on:'#fb923c',off:'#2b1408'},'c-purple':{on:'#c084fc',off:'#1e0a38'},
  };
  return (m[colorClass]||m['c-pink'])[on?'on':'off'];
}

async function loadData() {
  try {
    const url = `${API_URL}?t=${Date.now()}`;
    const res  = await fetch(url, { cache: 'no-store' });
    const data = await res.json();
    render(data);
  } catch(e) {
    document.getElementById('cards').innerHTML =
      `<div class="error-msg">⚠️ Could not reach Railway endpoint.<br><small>${e.message}</small></div>`;
  }
}

function refreshIfVisible() {
  if (document.visibilityState === 'visible') loadData();
}

function render(data) {
  const {habits, dates, generated} = data;
  const weeksHistory = Number.isFinite(data.weeksHistory)
    ? data.weeksHistory
    : Math.max(1, Math.round((dates?.length || 0) / 7));
  const todayIndex = Array.isArray(dates) && data.todayDate
    ? dates.indexOf(data.todayDate)
    : -1;

  // Last updated
  const gen = new Date(generated);
  document.getElementById('lastUpdated').textContent =
    gen.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false });

  document.getElementById('weeksChip').textContent = `${weeksHistory} weeks`;

  // Defensive cleanup: if stale markup still contains removed stats, strip them.
  document.querySelectorAll('.stats .stat').forEach(stat => {
    const label = (stat.querySelector('.k')?.textContent || '').trim().toLowerCase();
    if (label === 'done today' || label.includes('week rate')) stat.remove();
  });

  // Stats
  const weekScore  = habits.reduce((a,h)=>a+h.days.slice(-7).reduce((x,y)=>x+y,0),0);
  document.getElementById('sHabits').textContent = habits.length;
  document.getElementById('sWeek').textContent   = weekScore;

  // ── Cards ──────────────────────────────────────────────────────────────────
  const cards = document.getElementById('cards');
  cards.innerHTML = '';

  habits.forEach(habit => {
    const cc      = `c-${habit.color||'pink'}`;
    const icon    = habitIcon(habit.name);
    const isDone  = todayIndex >= 0
      ? habit.days[todayIndex] === 1
      : habit.todayDone;
    const checkBg = isDone ? 'rgba(74,222,128,.15)' : 'rgba(138,92,255,.18)';
    const checkIcon = isDone ? '✅' : '⭕️';

    const article = document.createElement('article');
    article.className = `habit-card ${cc}`;
    article.innerHTML = `
      <div class="habit-top">
        <div class="iconbox">${icon}</div>
        <div class="meta">
          <h3>${habit.name}</h3>
          <div class="line">${[habit.frequency,habit.description].filter(Boolean).join(' · ')}</div>
        </div>
        ${isDone
          ? `<div class="check done" style="background:${checkBg}">${checkIcon}</div>`
          : `<button class="check" type="button"
               style="background:${checkBg}" title="Log directly to Notion">${checkIcon}</button>`
        }
      </div>
      <div class="grid-wrap">
        <div class="grid-shell">
          <div class="day-labels">
            <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
          </div>
          <div class="grid"></div>
        </div>
      </div>
      <div class="legend">
        <span>${weeksHistory} weeks ago</span>
        <div class="legend-right">
          <span><i class="mini" style="background:${getColor(cc,false)}"></i>missed</span>
          <span><i class="mini" style="background:${getColor(cc,true)}"></i>done</span>
          <span>today</span>
        </div>
      </div>`;

    const gridWrap = article.querySelector('.grid-wrap');
    const grid = article.querySelector('.grid');
    const checkBtn = article.querySelector('button.check');
    if (checkBtn) {
      checkBtn.addEventListener('click', () => logHabitFromWeb(habit, checkBtn));
    }
    const dateRows = dates.map((day, i) => ({ day, value: habit.days[i] ?? 0 }));
    const weekMap = new Map();
    dateRows.forEach(({ day, value }) => {
      const d = new Date(`${day}T12:00:00`);
      if (Number.isNaN(d.getTime())) return;
      const weekStart = new Date(d);
      weekStart.setDate(d.getDate() - d.getDay());
      const key = weekStart.toISOString().slice(0, 10);
      if (!weekMap.has(key)) weekMap.set(key, new Array(7).fill(null));
      weekMap.get(key)[d.getDay()] = { day, value };
    });

    [...weekMap.keys()].sort().forEach((weekKey) => {
      const week = weekMap.get(weekKey);
      week.forEach((entry, dayIdx) => {
      const cell    = document.createElement('div');
      const value = entry?.value ?? 0;
      const cellDate = entry?.day;
      const isToday = cellDate === data.todayDate;
      const isFuture = Boolean(cellDate && data.todayDate && cellDate > data.todayDate);
      cell.className = `cell ${value?'on':'off'} ${isToday?'today':''} ${isFuture?'future':''}`;
      if (cellDate) {
        const d = new Date(`${cellDate}T12:00:00`);
        cell.title = `${d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})} · ${value?'✅ done':'⭕️ not done'}`;
      } else {
        const d = new Date(`${weekKey}T12:00:00`);
        d.setDate(d.getDate() + dayIdx);
        cell.title = `${d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'})} · outside tracking range`;
      }
      grid.appendChild(cell);
    });
    });

    cards.appendChild(article);

    // Default viewport to newest entries (right side) on first render.
    requestAnimationFrame(() => {
      gridWrap.scrollLeft = gridWrap.scrollWidth;
    });
  });

}

loadData();
setInterval(loadData, 5*60*1000);
window.addEventListener('focus', loadData);
document.addEventListener('visibilitychange', refreshIfVisible);
</script>
</body>
</html>
