<!doctype html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HealthKit</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root{
      --bg:#0d0d0f;--bg-card:#141416;--bg-card-hover:#1a1a1e;--border:#1e1e22;
      --text-primary:#ffffff;--text-secondary:#888888;--text-muted:#444444;
      --accent-blue:#6b8cff;--accent-green:#4ade80;--accent-red:#ff6b6b;--accent-yellow:#fbbf24;
      --shadow:0 22px 70px rgba(0,0,0,.35);--radius:24px;
    }
    html[data-theme="light"]{
      --bg:#f5f5f7;--bg-card:#ffffff;--bg-card-hover:#f0f0f5;--border:#e5e5ea;
      --text-primary:#1d1d1f;--text-secondary:#86868b;--text-muted:#c7c7cc;
      --accent-blue:#007aff;--accent-green:#34c759;--accent-red:#ff3b30;--accent-yellow:#ff9500;
      --shadow:0 18px 50px rgba(29,29,31,.08);
    }
    *{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text-primary);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Inter',sans-serif;transition:background .2s ease,color .2s ease}
    .app{width:min(1220px,100%);margin:0 auto;padding:22px 14px 42px}.header{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:14px;margin-bottom:22px}.title{font-size:2rem;font-weight:760;letter-spacing:-.05em}.subtitle{color:var(--text-secondary);font-size:.88rem;margin-top:4px}.updated{justify-self:center;color:var(--text-secondary);font-size:.88rem}.header-actions{justify-self:end;display:flex;align-items:center;gap:8px}.theme-toggle,.habit-link{border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);height:44px;border-radius:999px;cursor:pointer}.theme-toggle{color:var(--text-primary);width:44px;font-size:1.1rem}.habit-link{display:inline-flex;align-items:center;padding:0 14px;text-decoration:none;font-weight:700;font-size:.88rem}.range{display:inline-flex;gap:6px;padding:6px;background:var(--bg-card);border:1px solid var(--border);border-radius:999px;margin-bottom:18px}.range button{border:none;border-radius:999px;padding:10px 18px;color:var(--text-secondary);background:transparent;font-weight:700;cursor:pointer}.range button.active{background:var(--accent-blue);color:#fff}.banner{display:none;margin:0 0 18px;padding:14px 16px;border:1px solid rgba(255,107,107,.35);border-radius:18px;background:rgba(255,107,107,.1);color:var(--accent-red)}.grid{display:grid;gap:14px}.scores{grid-template-columns:repeat(4,1fr);margin-bottom:14px}.metrics{grid-template-columns:repeat(4,1fr);margin:14px 0}.card,.metric,.chart-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}.card{padding:18px;min-height:190px}.card.muted{opacity:.68}.card-top{display:flex;align-items:center;justify-content:space-between;gap:10px}.score-name{font-weight:750}.info{border:none;background:transparent;color:var(--text-secondary);font-size:1rem;cursor:pointer}.score{font-size:3.5rem;line-height:1;font-weight:800;letter-spacing:-.08em;margin:20px 0 8px}.desc{color:var(--text-secondary);font-size:.92rem;line-height:1.35}.badge{display:inline-flex;margin-left:8px;padding:4px 8px;border-radius:999px;background:rgba(251,191,36,.12);color:var(--accent-yellow);font-size:.72rem;font-weight:800}.explain{display:none;margin-top:14px;padding-top:14px;border-top:1px solid var(--border);color:var(--text-secondary);font-size:.86rem;line-height:1.45}.explain.show{display:block}.metric{padding:16px}.metric-name{color:var(--text-secondary);font-size:.74rem;letter-spacing:.08em;text-transform:uppercase;font-weight:800}.metric-value{font-size:2rem;font-weight:800;letter-spacing:-.04em;margin:10px 0 5px}.delta{font-size:.88rem;color:var(--text-secondary)}.delta.good{color:var(--accent-green)}.delta.bad{color:var(--accent-red)}.delta.flat{color:var(--text-secondary)}.charts{grid-template-columns:1fr;gap:16px}.chart-card{padding:18px}.chart-head{display:flex;align-items:flex-end;justify-content:space-between;gap:10px;margin-bottom:12px}.chart-title{font-size:1.05rem;font-weight:780}.chart-sub{color:var(--text-secondary);font-size:.84rem}.chart-wrap{height:340px}.chart-wrap.small{height:220px;margin-top:14px}.empty{padding:28px;text-align:center;color:var(--text-secondary);border:1px dashed var(--border);border-radius:18px}.loading{padding:28px;color:var(--text-secondary)}.footer{margin:30px 0 6px;text-align:center;color:var(--text-secondary);font-size:.86rem}.footer a{color:var(--accent-blue);text-decoration:none}.skeleton{min-height:140px;background:linear-gradient(90deg,var(--bg-card),var(--bg-card-hover),var(--bg-card));background-size:200% 100%;animation:pulse 1.1s infinite;border-radius:var(--radius)}@keyframes pulse{to{background-position:-200% 0}}
    @media(max-width:980px){.scores{grid-template-columns:repeat(2,1fr)}.metrics{grid-template-columns:repeat(2,1fr)}}
    @media(max-width:620px){.app{padding:18px 10px 32px}.header{grid-template-columns:1fr auto}.updated{grid-column:1/-1;grid-row:2;justify-self:start}.title{font-size:1.8rem}.scores,.metrics{grid-template-columns:1fr}.range{width:100%;justify-content:space-between}.range button{flex:1;padding:10px 12px}.chart-wrap{height:280px}}
  </style>
</head>
<body>
  <main class="app">
    <header class="header">
      <div>
        <div class="title">HealthKit</div>
        <div class="subtitle">Powered by Notion · Live from Railway</div>
      </div>
      <div class="updated" id="lastUpdated">Loading…</div>
      <div class="header-actions">
        <a class="habit-link" href="https://amthatmh.github.io/2nd-brain-bot/">HabitKit</a>
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">☾</button>
      </div>
    </header>

    <nav class="range" aria-label="Time range">
      <button class="active" data-range="1m">1M</button><button data-range="3m">3M</button><button data-range="6m">6M</button><button data-range="all">All</button>
    </nav>
    <div class="banner" id="errorBanner">Could not load health data. Try again.</div>

    <section class="grid scores" id="scores"><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div></section>
    <section class="grid metrics" id="metrics"></section>
    <section class="grid charts" id="charts"><div class="loading">Loading charts…</div></section>

    <footer class="footer">Data from Apple Health via Auto Export · Withings scale · <a href="/">HabitKit dashboard</a></footer>
  </main>
<script>
const API_BASE = 'https://worker-production-d366.up.railway.app';
const RANGES = ['1m', '3m', '6m', 'all'];
const cache = {};
const charts = {};
let currentRange = '1m';
const metricDefs = {
  weight:{label:'Weight',unit:'kg',good:'down'},body_fat:{label:'Body Fat',unit:'%',good:'down'},lean_mass:{label:'Lean Mass',unit:'kg',good:'up'},resting_hr:{label:'Resting HR',unit:'bpm',good:'down'},
  hrv:{label:'HRV',unit:'ms',good:'up'},vo2_max:{label:'VO2 Max',unit:'',good:'up'},respiratory:{label:'Resp. Rate',unit:'brpm',good:'flat'},headphone_db:{label:'Headphone dB',unit:'dB',good:'down'}
};
const scoreInfo = {
  body:'Combines weight trend, body fat %, and lean mass changes over the selected period. A score above 70 means all three are moving in a healthy direction.',
  cardio:'Combines resting heart rate trend, HRV trend, and VO2 Max direction. Lower resting HR and higher HRV are both positive signals.',
  activity:(steps)=>`Weighted: Workout days = 60%, Steps goal days = 40%. Target: 3 workout sessions/week and 7 days/week hitting ${steps} steps.`,
  sleep:'Sleep tracking is coming soon via Fitbit integration. This score will include sleep duration and stage quality.'
};
function applyTheme(theme){document.documentElement.dataset.theme=theme;localStorage.setItem('health_theme',theme);document.getElementById('themeToggle').textContent=theme==='dark'?'☾':'☀';}
applyTheme(localStorage.getItem('health_theme')||'dark');
document.getElementById('themeToggle').addEventListener('click',()=>applyTheme(document.documentElement.dataset.theme==='dark'?'light':'dark'));
document.querySelectorAll('.range button').forEach(btn=>btn.addEventListener('click',()=>{
  document.querySelectorAll('.range button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentRange=btn.dataset.range;
  if(cache[currentRange]){
    document.getElementById('errorBanner').style.display='none';
    renderDashboard(cache[currentRange]);
  }else{
    fetchDashboard(currentRange);
  }
}));
async function prefetchAll(){
  document.getElementById('errorBanner').style.display='none';
  setLoading();
  await Promise.allSettled(
    RANGES.map(range =>
      fetch(`${API_BASE}/api/health-dashboard?range=${range}`)
        .then(async res => {
          const data = await res.json();
          if(!res.ok) throw new Error(data.message || `HTTP ${res.status}`);
          cache[range] = data;
        })
        .catch(err => console.warn(`Failed to fetch range ${range}:`, err))
    )
  );
  if(cache['1m']){
    renderDashboard(cache['1m']);
  }else{
    showErrorState('Could not load health data. Try refreshing.');
  }
}
async function fetchDashboard(range='1m'){
  document.getElementById('errorBanner').style.display='none';
  setLoading();
  try{
    const res = await fetch(`${API_BASE}/api/health-dashboard?range=${range}`);
    const data = await res.json();
    if(!res.ok) throw new Error(data.message || `HTTP ${res.status}`);
    cache[range] = data;
    renderDashboard(data);
  }catch(err){console.error(err);showErrorState('Could not load data for this range.');}
}
function setLoading(){document.getElementById('scores').innerHTML='<div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div><div class="skeleton"></div>';document.getElementById('metrics').innerHTML='';document.getElementById('charts').innerHTML='<div class="loading">Loading charts…</div>';}
function setEmpty(msg){destroyCharts();document.getElementById('scores').innerHTML=`<div class="empty">${msg}</div>`;document.getElementById('metrics').innerHTML='';document.getElementById('charts').innerHTML='';}
function showErrorState(msg){document.getElementById('errorBanner').textContent=msg;document.getElementById('errorBanner').style.display='block';setEmpty(msg);}
function renderDashboard(data){
  document.getElementById('lastUpdated').textContent = data.generated_at ? `Updated ${new Date(data.generated_at).toLocaleString()}` : 'Updated just now';
  renderScores(data); renderMetrics(data); renderCharts(data);
}
function renderScores(data){
  const cfg=[['body','🏋️ Body'],['cardio','❤️ Cardio'],['activity','🏃 Activity'],['sleep','😴 Sleep']];
  document.getElementById('scores').innerHTML=cfg.map(([key,label])=>{const s=data.scores?.[key]||{};const muted=key==='sleep'?' muted':'';const badge=key==='sleep'?'<span class="badge">Coming soon</span>':'';const info=key==='activity'?scoreInfo.activity(data.steps_threshold||s.steps_threshold||10000):scoreInfo[key];return `<article class="card${muted}"><div class="card-top"><div class="score-name">${label}${badge}</div><button class="info" onclick="toggleInfo(this)">ⓘ</button></div><div class="score">${s.value ?? '—'}</div><div class="desc">${s.description || 'Not enough data yet'}</div><div class="explain">${info}</div></article>`}).join('');
}
function toggleInfo(btn){btn.closest('.card').querySelector('.explain').classList.toggle('show');}
function renderMetrics(data){
  document.getElementById('metrics').innerHTML=Object.entries(metricDefs).map(([key,def])=>{const value=data.latest?.[key];const delta=data.deltas?.[key];const cls=deltaClass(delta,def.good);const arrow=delta?.direction==='up'?'↑':delta?.direction==='down'?'↓':'—';const deltaText=delta?`${arrow} ${Math.abs(delta.value)} ${delta.unit}`:'No data yet';return `<article class="metric"><div class="metric-name">${def.label}</div><div class="metric-value">${value ?? '—'}${value!=null&&def.unit?' <small>'+def.unit+'</small>':''}</div><div class="delta ${cls}">${deltaText}</div></article>`}).join('');
}
function deltaClass(delta,good){if(!delta||delta.direction==='flat')return 'flat'; if(good==='flat')return 'flat'; return delta.direction===good?'good':'bad';}
function has(points){return Array.isArray(points)&&points.length>0;}
function cssVar(name){return getComputedStyle(document.documentElement).getPropertyValue(name).trim();}
function chartBase(){return {responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:cssVar('--text-secondary'),boxWidth:10,usePointStyle:true}},tooltip:{mode:'index',intersect:false}},scales:{x:{ticks:{color:cssVar('--text-secondary')},grid:{color:'transparent'}},y:{ticks:{color:cssVar('--text-secondary')},grid:{color:cssVar('--border')}}}};}
function renderCharts(data){
  destroyCharts(); const m=data.metrics||{}; let html='';
  if(has(m.weight)||has(m.body_fat)||has(m.lean_mass)) html += chartCard('bodyChart','Body Composition','Weight, body fat, and lean mass trends');
  if(has(m.resting_hr)||has(m.hrv)||has(m.vo2_max)) html += chartCard('cardioChart','Cardiovascular','Resting HR, HRV, and VO2 Max');
  if(Array.isArray(data.weekly_activity)&&data.weekly_activity.length) html += chartCard('activityChart','Activity','Workout days and steps-goal days per week');
  document.getElementById('charts').innerHTML = html || '<div class="empty">Not enough data yet for charts.</div>';
  if(document.getElementById('bodyChart')) makeBodyChart(m); if(document.getElementById('cardioChart')) makeCardioChart(m); if(document.getElementById('activityChart')) makeActivityChart(data.weekly_activity);
}
function chartCard(id,title,sub){return `<article class="chart-card"><div class="chart-head"><div><div class="chart-title">${title}</div><div class="chart-sub">${sub}</div></div></div><div class="chart-wrap"><canvas id="${id}"></canvas></div></article>`;}
function labelsFor(...series){return [...new Set(series.flatMap(s=>(s||[]).map(p=>p.date)))].sort();}
function mapSeries(points,labels){const byDate=Object.fromEntries((points||[]).map(p=>[p.date,p.value]));return labels.map(d=>byDate[d]??null);}
function makeBodyChart(m){const labels=labelsFor(m.weight,m.body_fat,m.lean_mass);charts.body=new Chart(document.getElementById('bodyChart'),{type:'line',data:{labels,datasets:[{label:'Weight kg',data:mapSeries(m.weight,labels),borderColor:cssVar('--accent-blue'),tension:.4,yAxisID:'y'},{label:'Body Fat %',data:mapSeries(m.body_fat,labels),borderColor:cssVar('--accent-yellow'),tension:.4,yAxisID:'y1'},{label:'Lean Mass kg',data:mapSeries(m.lean_mass,labels),borderColor:cssVar('--accent-green'),tension:.4,yAxisID:'y'}]},options:{...chartBase(),scales:{...chartBase().scales,y1:{position:'right',ticks:{color:cssVar('--text-secondary')},grid:{drawOnChartArea:false}}}}});}
function makeCardioChart(m){const labels=labelsFor(m.resting_hr,m.hrv,m.vo2_max);charts.cardio=new Chart(document.getElementById('cardioChart'),{type:'line',data:{labels,datasets:[{label:'Resting HR',data:mapSeries(m.resting_hr,labels),borderColor:cssVar('--accent-red'),tension:.4,yAxisID:'y'},{label:'HRV',data:mapSeries(m.hrv,labels),borderColor:cssVar('--accent-green'),tension:.4,yAxisID:'y1'},{label:'VO2 Max',data:mapSeries(m.vo2_max,labels),borderColor:cssVar('--accent-blue'),tension:.4,yAxisID:'y1'}]},options:{...chartBase(),scales:{...chartBase().scales,y1:{position:'right',ticks:{color:cssVar('--text-secondary')},grid:{drawOnChartArea:false}}}}});}
function makeActivityChart(weekly){const labels=weekly.map(w=>w.week);charts.activity=new Chart(document.getElementById('activityChart'),{type:'bar',data:{labels,datasets:[{label:'Workout days',data:weekly.map(w=>w.workout_days),backgroundColor:cssVar('--accent-blue')},{label:'Steps days',data:weekly.map(w=>w.steps_days),backgroundColor:cssVar('--accent-green')},{label:'Workout target',data:weekly.map(()=>3),type:'line',borderColor:cssVar('--accent-yellow'),pointRadius:0,borderDash:[5,5]},{label:'Steps target',data:weekly.map(()=>7),type:'line',borderColor:cssVar('--text-secondary'),pointRadius:0,borderDash:[3,5]}]},options:chartBase()});}
function destroyCharts(){Object.values(charts).forEach(c=>c?.destroy());Object.keys(charts).forEach(k=>delete charts[k]);}
prefetchAll();
</script>
</body>
</html>
